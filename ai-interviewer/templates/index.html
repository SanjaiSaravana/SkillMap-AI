<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interviewer | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 glass rounded-3xl text-center shadow-2xl">
        <div class="mb-6 inline-block p-4 rounded-2xl bg-blue-500/10">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </div>
        <h1 class="text-4xl font-800 mb-2 tracking-tight">Mock<span class="gradient-text">Master AI</span></h1>
        <p class="text-gray-400 mb-8">Master your next career move with real-time AI feedback.</p>
        
        <div class="space-y-4">
            <label class="block text-left text-sm font-semibold text-gray-500 ml-1">Select Your Target Role</label>
            <select id="roleSelect" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                <option value="Full Stack Developer">Full Stack Developer</option>
                <option value="Product Designer">Product Designer</option>
                <option value="Data Analyst">Data Analyst</option>
                <option value="AI Researcher">AI Researcher</option>
                <option value="Sales Executive">Sales Executive</option>
            </select>
            <button onclick="startInterview()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                Start Session
            </button>
        </div>
    </div>

    <script>
        function startInterview() {
            const role = document.getElementById('roleSelect').value;
            window.location.href = `/interview?role=${encodeURIComponent(role)}`;
        }
    </script>
</body>
</html>
