<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Report | MockMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .score-card { background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-5xl font-800 mb-2">Performance <span class="text-blue-500 underline decoration-blue-500/30">Review</span></h1>
        <p class="text-gray-400 mb-12">Role: <span id="role-tag">Processing...</span></p>

        <div class="grid grid-cols-2 gap-8 mb-12">
            <div class="score-card p-8 rounded-[32px] text-center">
                <p class="text-gray-500 uppercase text-xs font-bold tracking-widest mb-4">Technical Proficiency</p>
                <div class="text-6xl font-black text-blue-400" id="tech-score">--</div>
                <p class="mt-2 text-gray-400">/ 10</p>
            </div>
            <div class="score-card p-8 rounded-[32px] text-center">
                <p class="text-gray-500 uppercase text-xs font-bold tracking-widest mb-4">Soft Skills</p>
                <div class="text-6xl font-black text-purple-400" id="soft-score">--</div>
                <p class="mt-2 text-gray-400">/ 10</p>
            </div>
        </div>

        <div class="space-y-8">
            <div class="score-card p-8 rounded-[32px]">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Summary Feedback
                </h3>
                <p id="general-feedback" class="text-gray-300 leading-relaxed italic text-lg">Calculating results...</p>
            </div>

            <div class="score-card p-8 rounded-[32px]">
                <h3 class="text-xl font-bold mb-6">Action Items for Improvement</h3>
                <div id="improve-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    </div>
            </div>
        </div>

        <a href="/" class="mt-12 block text-center text-gray-500 hover:text-white transition-all underline underline-offset-8">Return to Dashboard</a>
    </div>

    <script>
        const rawData = sessionStorage.getItem('last_report');
        if (rawData) {
            const data = JSON.parse(rawData);
            document.getElementById('tech-score').innerText = data.technical_score || "7";
            document.getElementById('soft-score').innerText = data.soft_skills_score || "8";
            document.getElementById('general-feedback').innerText = data.feedback || "Good job!";
            
            const listDiv = document.getElementById('improve-list');
            (data.areas_to_improve || []).forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white/5 rounded-2xl border border-white/10 text-sm font-medium text-blue-300";
                div.innerText = "🚀 " + item;
                listDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
