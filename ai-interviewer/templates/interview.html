<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Session | MockMaster</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .video-container { border-radius: 24px; box-shadow: 0 0 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col p-6">
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full pulse-red"></div>
            <h2 class="text-xl font-bold tracking-tight">Interviewing: <span class="text-blue-400">{{ role }}</span></h2>
        </div>
        <button id="finish-btn" class="bg-white/5 hover:bg-red-500/10 text-red-400 border border-red-500/20 px-6 py-2 rounded-full transition-all">End Interview</button>
    </div>

    <div class="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
        <div class="col-span-8 relative video-container overflow-hidden bg-black">
            <video id="videoElement" class="w-full h-full object-cover scale-x-[-1]" autoplay muted></video>
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4">
                <button id="record-btn" class="bg-blue-600 hover:bg-blue-500 p-6 rounded-full shadow-2xl active:scale-90 transition-all group">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </button>
            </div>
        </div>

        <div class="col-span-4 flex flex-col bg-white/5 rounded-[24px] border border-white/10 overflow-hidden">
            <div id="chat-log" class="flex-1 p-6 space-y-4 overflow-y-auto chat-area">
                <div class="bg-blue-500/10 p-4 rounded-2xl rounded-tl-none border border-blue-500/20">
                    <p class="text-sm text-blue-400 font-bold mb-1">AI HR</p>
                    <p class="text-gray-200">Hello! I'm ready. Whenever you're ready, hold the mic and introduce yourself.</p>
                </div>
            </div>
            <div class="p-4 bg-black/20 text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Live Transcript</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/interview.js') }}"></script>
</body>
</html>
